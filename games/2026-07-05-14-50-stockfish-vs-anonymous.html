<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You beat the machine — and it declined four gifts — Game Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #12161d;
    --panel: #181e27;
    --panel-border: #262f3b;
    --cream: #ece7da;
    --muted: #8b93a1;
    --gold: #c9a24b;
    --rust: #c1502f;
    --mono: 'IBM Plex Mono', monospace;
    --serif: 'Fraunces', serif;
    --sans: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--cream);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  body { padding: 0 0 64px; }

  header.page-head {
    padding: 48px 20px 32px;
    max-width: 980px;
    margin: 0 auto;
    border-bottom: 1px solid var(--panel-border);
  }
  .eyebrow-top {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 14px;
  }
  h1.title {
    font-family: var(--serif);
    font-optical-sizing: auto;
    font-weight: 600;
    font-size: 40px;
    line-height: 1.05;
    margin: 0 0 14px;
    color: var(--cream);
    letter-spacing: -0.01em;
  }
  h1.title em {
    font-style: italic;
    color: var(--rust);
  }
  p.subtitle {
    font-size: 15px;
    line-height: 1.6;
    color: var(--muted);
    margin: 0;
    max-width: 62ch;
  }

  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 20px;
  }

  .error-banner {
    margin-top: 28px;
    padding: 14px 16px;
    border: 1px solid rgba(193,80,47,0.55);
    background: rgba(193,80,47,0.12);
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 13px;
    color: #e8a18c;
    line-height: 1.5;
  }

  /* ---------- replay area: board + feedback panel ---------- */
  .replay {
    display: grid;
    grid-template-columns: minmax(300px, 420px) 1fr;
    gap: 28px;
    margin-top: 32px;
    align-items: start;
  }
  @media (max-width: 860px) {
    .replay { grid-template-columns: 1fr; }
  }

  .board-col {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
  }
  .board-svg {
    width: 100%;
    height: auto;
    border-radius: 6px;
    display: block;
  }
  .legend {
    display: flex;
    gap: 18px;
    justify-content: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    min-height: 14px;
  }
  .legend[hidden] { display: none; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .dot.rust { background: var(--rust); }
  .dot.gold { background: var(--gold); }

  .controls {
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  .controls button {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--cream);
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 8px 0;
    flex: 1;
    cursor: pointer;
    transition: border-color 120ms, color 120ms;
    white-space: nowrap;
  }
  .controls button:hover { border-color: var(--gold); color: var(--gold); }
  .controls button:disabled { opacity: 0.35; cursor: default; }
  .controls button:disabled:hover { border-color: var(--panel-border); color: var(--cream); }

  .move-counter {
    text-align: center;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
    min-height: 16px;
  }
  .move-counter b { color: var(--cream); font-weight: 600; }
  .kbd-hint {
    text-align: center;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--muted);
    opacity: 0.7;
  }

  /* ---------- feedback panel ---------- */
  .fb-panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 22px 20px 24px;
    position: relative;
    overflow: hidden;
    min-height: 200px;
  }
  .fb-panel::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--panel-border);
  }
  .fb-panel.mistake-active::before { background: var(--rust); opacity: 0.7; }

  .fb-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
  }
  .fb-head {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .move-no {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 30px;
    color: var(--gold);
    line-height: 1;
    min-width: 46px;
  }
  .fb-head-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  h2.played-move {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 22px;
    margin: 0;
    color: var(--cream);
  }
  .swing-badge {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--rust);
    background: rgba(193,80,47,0.12);
    border: 1px solid rgba(193,80,47,0.35);
    padding: 5px 9px;
    border-radius: 7px;
    white-space: nowrap;
  }
  h3.fb-title {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 18px;
    margin: 0 0 10px;
    color: var(--gold);
  }
  p.explain {
    font-size: 14.5px;
    line-height: 1.65;
    color: #cfc9ba;
    margin: 0 0 20px;
  }

  .compare {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    border-top: 1px solid var(--panel-border);
    padding-top: 16px;
    margin-bottom: 20px;
  }
  .compare-col {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: center;
    padding: 8px 4px;
    border-radius: 8px;
  }
  .compare-col.played { background: rgba(193,80,47,0.10); }
  .compare-col.best { background: rgba(201,162,75,0.12); }
  .compare-label {
    font-family: var(--mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--muted);
    line-height: 1.3;
  }
  .compare-eval {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    color: var(--cream);
  }
  .compare-col.played .compare-eval { color: var(--rust); }
  .compare-col.best .compare-eval { color: var(--gold); }

  .retain {
    border: 1px solid rgba(201,162,75,0.35);
    background: rgba(201,162,75,0.06);
    border-radius: 10px;
    padding: 14px 16px 6px;
  }
  .retain-head {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 10px;
  }
  .retain ol {
    margin: 0; padding: 0 0 0 2px;
    list-style: none;
    counter-reset: retain;
  }
  .retain li {
    counter-increment: retain;
    display: flex;
    gap: 10px;
    padding: 0 0 14px;
  }
  .retain li::before {
    content: counter(retain);
    font-family: var(--serif);
    font-weight: 600;
    font-size: 16px;
    color: var(--gold);
    min-width: 16px;
    line-height: 1.3;
  }
  .retain .lesson {
    display: block;
    font-weight: 600;
    font-size: 13.5px;
    color: var(--cream);
    margin-bottom: 3px;
  }
  .retain .detail {
    display: block;
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--muted);
  }
  .fb-hint {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--muted);
    margin: 16px 0 0;
    line-height: 1.6;
  }

  /* ---------- section headings ---------- */
  h2.section-head {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 24px;
    margin: 44px 0 6px;
    color: var(--cream);
  }
  p.section-sub {
    font-size: 13.5px;
    color: var(--muted);
    margin: 0 0 18px;
    line-height: 1.6;
  }

  /* ---------- move list ---------- */
  .move-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 10px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 16px;
    max-height: 220px;
    overflow-y: auto;
  }
  .move-pair {
    display: flex;
    align-items: baseline;
    gap: 2px;
    font-family: var(--mono);
    font-size: 13px;
  }
  .move-pair .num {
    color: var(--muted);
    font-size: 11px;
    margin-right: 2px;
  }
  .move-list button.san {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--cream);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 2px 6px;
    cursor: pointer;
  }
  .move-list button.san:hover { border-color: var(--gold); color: var(--gold); }
  .move-list button.san.current {
    background: rgba(201,162,75,0.18);
    border-color: rgba(201,162,75,0.5);
    color: var(--gold);
  }
  .move-list button.san.mistake { color: var(--rust); }
  .move-list button.san.mistake::after { content: "?"; opacity: 0.8; }
  .move-list button.san.mistake.current {
    background: rgba(193,80,47,0.16);
    border-color: rgba(193,80,47,0.5);
    color: var(--rust);
  }

  /* ---------- mistakes list ---------- */
  .mistake-card {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    text-align: left;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 16px 18px;
    margin-top: 12px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    color: var(--cream);
    font-family: var(--sans);
    transition: border-color 120ms;
  }
  .mistake-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--rust);
    opacity: 0.7;
  }
  .mistake-card:hover { border-color: var(--rust); }
  .mistake-card.active { border-color: var(--rust); background: #1c222d; }
  .mistake-card .move-no { font-size: 26px; min-width: 42px; }
  .mistake-card .mc-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }
  .mistake-card h3 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 17px;
    margin: 0;
    color: var(--cream);
  }
  .mistake-card .mc-moves {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--muted);
  }
  .mistake-card .mc-moves .played-san { color: var(--rust); }
  .mistake-card .mc-moves .best-san { color: var(--gold); }

  footer {
    max-width: 980px;
    margin: 40px auto 0;
    padding: 20px 20px 0;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--muted);
    border-top: 1px solid var(--panel-border);
    line-height: 1.6;
  }

  @media (max-width: 400px) {
    h1.title { font-size: 32px; }
    .compare-label { font-size: 8.5px; }
    .compare-eval { font-size: 14px; }
    .controls button { font-size: 11px; }
  }
</style>
</head>
<body>

<header class="page-head">
  <span class="eyebrow-top" id="head-eyebrow"></span>
  <h1 class="title" id="head-title"></h1>
  <p class="subtitle" id="head-subtitle"></p>
</header>

<main>
  <div id="error-banner" class="error-banner" hidden></div>

  <section class="replay">
    <div class="board-col">
      <div id="board-mount"></div>
      <div class="legend" id="board-legend" hidden>
        <span class="legend-item"><i class="dot rust"></i>played</span>
        <span class="legend-item"><i class="dot gold"></i>engine's pick</span>
      </div>
      <div class="controls">
        <button id="btn-start" title="Start position (Home)">|&laquo;</button>
        <button id="btn-back10" title="Back 10 moves (Shift+&larr;)">&minus;10</button>
        <button id="btn-prev" title="Previous move (&larr;)">&lsaquo;</button>
        <button id="btn-next" title="Next move (&rarr;)">&rsaquo;</button>
        <button id="btn-fwd10" title="Forward 10 moves (Shift+&rarr;)">+10</button>
        <button id="btn-end" title="Final position (End)">&raquo;|</button>
      </div>
      <div class="move-counter" id="move-counter"></div>
      <div class="kbd-hint">&larr; &rarr; move &middot; shift+&larr;&rarr; jump 10 &middot; home/end</div>
    </div>

    <aside class="fb-panel" id="fb-panel"></aside>
  </section>

  <h2 class="section-head">The moves</h2>
  <p class="section-sub">Click any move to jump there. Moves marked in rust are the key mistakes.</p>
  <div class="move-list" id="move-list"></div>

  <h2 class="section-head">The biggest mistakes</h2>
  <p class="section-sub">Ranked by how hard the evaluation swung. Click one to jump the board to that moment and read the feedback.</p>
  <div id="mistake-list"></div>
</main>

<footer id="page-footer"></footer>

  }
  svg.appendChild(squares);

  // coordinates on edge squares
  const coords = svgEl("g", { id: "layer-coords", "font-family": "'IBM Plex Mono', monospace", "font-size": "9", "font-weight": "600" });
  for (let f = 0; f < 8; f++) {
    const i = flipped ? 56 + f : f;                  // bottom row square containing file f
    const [x, y] = sqXY(f + (flipped ? 56 : 0));     // any square in file f on visual bottom row
    const dark = ((f + (flipped ? 7 : 0)) % 2 === 0);
    const t = svgEl("text", { x: x + SQ - 4, y: y + SQ - 4, "text-anchor": "end", fill: dark ? LIGHT : DARK });
    t.textContent = FILES[f];
    coords.appendChild(t);
  }
  for (let r = 0; r < 8; r++) {
    const sq = r * 8 + (flipped ? 7 : 0);            // square of rank r on visual left column
    const [x, y] = sqXY(sq);
    const dark = (((flipped ? 7 : 0) + r) % 2 === 0);
    const t = svgEl("text", { x: x + 3, y: y + 11, fill: dark ? LIGHT : DARK });
    t.textContent = String(r + 1);
    coords.appendChild(t);
  }
  svg.appendChild(coords);

  svg.appendChild(svgEl("g", { id: "layer-hl" }));
  svg.appendChild(svgEl("g", { id: "layer-pieces" }));
  svg.appendChild(svgEl("g", { id: "layer-arrows" }));
  return svg;
}

function drawArrow(layer, fromName, toName, color) {
  const [fx, fy] = sqXY(sqIndex(fromName));
  const [tx, ty] = sqXY(sqIndex(toName));
  const x1 = fx + SQ / 2, y1 = fy + SQ / 2;
  const x2 = tx + SQ / 2, y2 = ty + SQ / 2;
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  if (!len) return;
  const ux = dx / len, uy = dy / len;
  const headLen = 0.62 * SQ, headHalf = 0.34 * SQ;
  const bx = x2 - ux * headLen, by = y2 - uy * headLen;   // base of arrowhead
  layer.appendChild(svgEl("line", {
    x1: x1 + ux * SQ * 0.18, y1: y1 + uy * SQ * 0.18, x2: bx, y2: by,
    stroke: color, "stroke-width": 9, "stroke-linecap": "butt", class: "arrow"
  }));
  const px = -uy, py = ux;   // perpendicular
  layer.appendChild(svgEl("polygon", {
    points: x2 + "," + y2 + " " + (bx + px * headHalf) + "," + (by + py * headHalf) + " " + (bx - px * headHalf) + "," + (by - py * headHalf),
    fill: color, class: "arrow"
  }));
}

// --------------------------------------------------------------------------
// Page rendering
// --------------------------------------------------------------------------

const $ = (id) => document.getElementById(id);

function renderHeader() {
  document.title = GAME.title.replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim() + " — Game Review";
  const you = GAME.playerColor === "white" ? GAME.white : GAME.black;
  const youPart = you && you.toLowerCase() !== GAME.playerColor ? " (" + you + ")" : "";
  $("head-eyebrow").textContent =
    GAME.white + " vs " + GAME.black + " · you played " + GAME.playerColor + youPart +
    " · " + GAME.result + (GAME.date ? " · " + GAME.date : "");
  $("head-title").innerHTML = GAME.title;
  $("head-subtitle").innerHTML = GAME.subtitle || "";
  $("page-footer").innerHTML =
    (GAME.event ? GAME.event + " · " : "") +
    (GAME.opening ? GAME.opening + " · " : "") +
    (GAME.analysisNote || "");
}

function sideOfPly(ply) { return ply % 2 === 0 ? "White" : "Black"; }
function moveNumOfPly(ply) { return Math.floor(ply / 2) + 1; }
function sanLabel(ply, san) { return moveNumOfPly(ply) + (ply % 2 ? "…" : ".") + " " + san; }

function renderFeedbackDefault() {
  const panel = $("fb-panel");
  panel.classList.remove("mistake-active");
  panel.innerHTML = "";
  const eyebrow = document.createElement("span");
  eyebrow.className = "fb-eyebrow";
  eyebrow.textContent = "Game summary";
  const p = document.createElement("p");
  p.className = "explain";
  p.innerHTML = GAME.summary || "";
  const hint = document.createElement("p");
  hint.className = "fb-hint";
  hint.textContent = "Step through the game with the controls, or click a mistake below — coaching notes appear here when the board reaches one of those moments.";
  panel.appendChild(eyebrow);
  panel.appendChild(p);
  panel.appendChild(hint);
}

function renderFeedbackMistake(mk) {
  const panel = $("fb-panel");
  panel.classList.add("mistake-active");
  panel.innerHTML = "";

  const head = document.createElement("div");
  head.className = "fb-head";
  const num = document.createElement("span");
  num.className = "move-no";
  num.textContent = moveNumOfPly(mk.ply);
  const text = document.createElement("div");
  text.className = "fb-head-text";
  const eb = document.createElement("span");
  eb.className = "eyebrow";
  eb.textContent = sideOfPly(mk.ply) + " to move · move " + moveNumOfPly(mk.ply);
  const h2 = document.createElement("h2");
  h2.className = "played-move";
  h2.textContent = moveNumOfPly(mk.ply) + (mk.ply % 2 ? "… " : ". ") + mk.played;
  text.appendChild(eb);
  text.appendChild(h2);
  const badge = document.createElement("span");
  badge.className = "swing-badge";
  badge.textContent = mk.swing;
  head.appendChild(num);
  head.appendChild(text);
  head.appendChild(badge);
  panel.appendChild(head);

  if (mk.title) {
    const h3 = document.createElement("h3");
    h3.className = "fb-title";
    h3.textContent = mk.title;
    panel.appendChild(h3);
  }

  const p = document.createElement("p");
  p.className = "explain";
  p.innerHTML = mk.explanation || "";
  panel.appendChild(p);

  const cmp = document.createElement("div");
  cmp.className = "compare";
  const cols = [
    ["before", "position before", mk.evalBefore],
    ["played", "you played · " + mk.played, mk.evalAfter],
    ["best", "better · " + mk.best, mk.evalBest]
  ];
  for (const [cls, label, val] of cols) {
    const col = document.createElement("div");
    col.className = "compare-col " + cls;
    const l = document.createElement("span");
    l.className = "compare-label";
    l.textContent = label;
    const v = document.createElement("span");
    v.className = "compare-eval";
    v.textContent = val;
    col.appendChild(l);
    col.appendChild(v);
    cmp.appendChild(col);
  }
  panel.appendChild(cmp);

  if (mk.takeaways && mk.takeaways.length) {
    const box = document.createElement("div");
    box.className = "retain";
    const rh = document.createElement("span");
    rh.className = "retain-head";
    rh.textContent = "What to retain";
    box.appendChild(rh);
    const ol = document.createElement("ol");
    for (const t of mk.takeaways) {
      const li = document.createElement("li");
      const body = document.createElement("div");
      const les = document.createElement("span");
      les.className = "lesson";
      les.textContent = t.lesson;
      const det = document.createElement("span");
      det.className = "detail";
      det.textContent = t.detail || "";
      body.appendChild(les);
      if (t.detail) body.appendChild(det);
      li.appendChild(body);
      ol.appendChild(li);
    }
    box.appendChild(ol);
    panel.appendChild(box);
  }
}

// --------------------------------------------------------------------------
// Wiring
// --------------------------------------------------------------------------

let positions = null;
let parseError = null;
try {
  positions = buildPositions(GAME.movesSan);
} catch (e) {
  parseError = e.message;
}

renderHeader();

if (parseError) {
  const banner = $("error-banner");
  banner.hidden = false;
  banner.textContent = "Could not replay this game — " + parseError +
    ". Check the movesSan array in the GAME data block.";
}

const totalPlies = positions ? positions.length - 1 : 0;
const mistakes = (GAME.mistakes || []).slice();
const mistakeByPly = new Map();
for (const mk of mistakes) mistakeByPly.set(mk.ply, mk);

let current = 0;
let piecesLayer = null, hlLayer = null, arrowsLayer = null;
const moveButtons = [];

function activeMistakeAt(ply) {
  // feedback stays visible on the position before the mistake and just after it
  return mistakeByPly.get(ply) || mistakeByPly.get(ply - 1) || null;
}

function renderPosition() {
  if (!positions) return;
  const pos = positions[current];

  hlLayer.innerHTML = "";
  if (pos.last) {
    for (const sq of [pos.last.from, pos.last.to]) {
      const [x, y] = sqXY(sq);
      hlLayer.appendChild(svgEl("rect", { x: x, y: y, width: SQ, height: SQ, fill: "rgba(201,162,75,0.35)" }));
    }
  }

  piecesLayer.innerHTML = "";
  for (let i = 0; i < 64; i++) {
    const p = pos.board[i];
    if (!p) continue;
    const [x, y] = sqXY(i);
    const use = svgEl("use", { href: "#" + PIECE_ID[p], transform: "translate(" + x + ", " + y + ")" });
    use.setAttributeNS("http://www.w3.org/1999/xlink", "xlink:href", "#" + PIECE_ID[p]);
    piecesLayer.appendChild(use);
  }

  arrowsLayer.innerHTML = "";
  const atMistakeBefore = mistakeByPly.get(current);
  if (atMistakeBefore) {
    if (atMistakeBefore.playedArrow) drawArrow(arrowsLayer, atMistakeBefore.playedArrow[0], atMistakeBefore.playedArrow[1], "#c1502fcc");
    if (atMistakeBefore.bestArrow) drawArrow(arrowsLayer, atMistakeBefore.bestArrow[0], atMistakeBefore.bestArrow[1], "#c9a24bcc");
  }
  $("board-legend").hidden = !atMistakeBefore;

  // counter
  const counter = $("move-counter");
  if (current === 0) {
    counter.innerHTML = "Start position · " + totalPlies + " half-moves";
  } else {
    const san = GAME.movesSan[current - 1];
    counter.innerHTML = "<b>" + sanLabel(current - 1, san) + "</b> · " +
      sideOfPly(current - 1) + " · move " + moveNumOfPly(current - 1) + " of " + moveNumOfPly(totalPlies - 1);
  }

  // controls enabled state
  $("btn-start").disabled = current === 0;
  $("btn-back10").disabled = current === 0;
  $("btn-prev").disabled = current === 0;
  $("btn-next").disabled = current === totalPlies;
  $("btn-fwd10").disabled = current === totalPlies;
  $("btn-end").disabled = current === totalPlies;

  // move list highlight
  for (let i = 0; i < moveButtons.length; i++) {
    moveButtons[i].classList.toggle("current", i === current - 1);
  }
  if (current > 0 && moveButtons[current - 1]) {
    moveButtons[current - 1].scrollIntoView({ block: "nearest" });
  }

  // feedback panel + mistake cards
  const mk = activeMistakeAt(current);
  if (mk) renderFeedbackMistake(mk); else renderFeedbackDefault();
  document.querySelectorAll(".mistake-card").forEach((card) => {
    card.classList.toggle("active", !!mk && Number(card.dataset.ply) === mk.ply);
  });
}

function goTo(ply) {
  if (!positions) return;
  current = Math.max(0, Math.min(totalPlies, ply));
  renderPosition();
}

if (positions) {
  const svg = buildBoardSvg();
  $("board-mount").appendChild(svg);
  piecesLayer = svg.querySelector("#layer-pieces");
  hlLayer = svg.querySelector("#layer-hl");
  arrowsLayer = svg.querySelector("#layer-arrows");

  // move list
  const list = $("move-list");
  for (let i = 0; i < GAME.movesSan.length; i += 2) {
    const pair = document.createElement("span");
    pair.className = "move-pair";
    const num = document.createElement("span");
    num.className = "num";
    num.textContent = moveNumOfPly(i) + ".";
    pair.appendChild(num);
    for (let j = i; j < Math.min(i + 2, GAME.movesSan.length); j++) {
      const btn = document.createElement("button");
      btn.className = "san" + (mistakeByPly.has(j) ? " mistake" : "");
      btn.textContent = GAME.movesSan[j];
      btn.addEventListener("click", () => {
        const scrollY = window.scrollY;
        goTo(j + 1);
        window.scrollTo(0, scrollY);
      });
      pair.appendChild(btn);
      moveButtons.push(btn);
    }
    list.appendChild(pair);
  }

  // mistake cards
  const mlist = $("mistake-list");
  for (const mk of mistakes) {
    const card = document.createElement("button");
    card.className = "mistake-card";
    card.dataset.ply = mk.ply;
    const num = document.createElement("span");
    num.className = "move-no";
    num.textContent = moveNumOfPly(mk.ply);
    const text = document.createElement("div");
    text.className = "mc-text";
    const h3 = document.createElement("h3");
    h3.textContent = mk.title || "Mistake at move " + moveNumOfPly(mk.ply);
    const mv = document.createElement("span");
    mv.className = "mc-moves";
    mv.innerHTML = sideOfPly(mk.ply).toLowerCase() + " · played <span class=\"played-san\">" +
      mk.played + "</span> · better <span class=\"best-san\">" + mk.best + "</span>";
    text.appendChild(h3);
    text.appendChild(mv);
    const badge = document.createElement("span");
    badge.className = "swing-badge";
    badge.textContent = mk.swing;
    card.appendChild(num);
    card.appendChild(text);
    card.appendChild(badge);
    card.addEventListener("click", () => {
      const scrollY = window.scrollY;
      goTo(mk.ply);
      window.scrollTo(0, scrollY);
    });
    mlist.appendChild(card);
  }

  // controls
  $("btn-start").addEventListener("click", (e) => {
    const scrollY = window.scrollY;
    goTo(0);
    window.scrollTo(0, scrollY);
  });
  $("btn-back10").addEventListener("click", (e) => {
    const scrollY = window.scrollY;
    goTo(current - 10);
    window.scrollTo(0, scrollY);
  });
  $("btn-prev").addEventListener("click", (e) => {
    const scrollY = window.scrollY;
    goTo(current - 1);
    window.scrollTo(0, scrollY);
  });
  $("btn-next").addEventListener("click", (e) => {
    const scrollY = window.scrollY;
    goTo(current + 1);
    window.scrollTo(0, scrollY);
  });
  $("btn-fwd10").addEventListener("click", (e) => {
    const scrollY = window.scrollY;
    goTo(current + 10);
    window.scrollTo(0, scrollY);
  });
  $("btn-end").addEventListener("click", (e) => {
    const scrollY = window.scrollY;
    goTo(totalPlies);
    window.scrollTo(0, scrollY);
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") { goTo(current - (e.shiftKey ? 10 : 1)); e.preventDefault(); }
    else if (e.key === "ArrowRight") { goTo(current + (e.shiftKey ? 10 : 1)); e.preventDefault(); }
    else if (e.key === "Home") { goTo(0); e.preventDefault(); }
    else if (e.key === "End") { goTo(totalPlies); e.preventDefault(); }
  });

  renderPosition();
} else {
  renderFeedbackDefault();
}

// test/debug hook
window.__review = {
  goTo: goTo,
  getPly: () => current,
  total: () => totalPlies,
  placement: (k) => positions ? fenPlacement(positions[k].board) : null,
  error: parseError
};

})();
</script>
</body>
</html>
